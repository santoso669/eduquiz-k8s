{% extends 'base.html' %}
{% block title %}Daftar — EduQuiz{% endblock %}
{% block content %}
<div style="max-width:440px;margin:3rem auto;">
  <div class="card">
    <h2 style="text-align:center;">📝 Buat Akun</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group"><label>Nama Lengkap</label><input type="text" name="nama" placeholder="Nama Anda" required></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="contoh@email.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Min. 6 karakter" required></div>
      <div class="form-group"><label>Daftar sebagai</label><select name="role"><option value="siswa">Siswa</option><option value="guru">Guru</option></select></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Daftar Sekarang</button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:0.88rem;color:var(--muted);">Sudah punya akun? <a href="{{ url_for('auth.login') }}" style="color:var(--purple-light);font-weight:600;">Login</a></p>
  </div>
</div>
{% endblock %}
